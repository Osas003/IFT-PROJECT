<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
        }

        .header h1 {
            color: #f8fafc;
            font-size: 22px;
            font-weight: 600;
        }

        .header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 4px;
        }

        .panel {
            background: #1e293b;
            border-radius: 20px;
            padding: 28px;
            border: 1px solid #334155;
        }

        /* Upload Zone */
        .drop-zone {
            border: 2px dashed #475569;
            border-radius: 14px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #0f172a;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            border-color: #6366f1;
            background: #1e293b;
        }

        .drop-zone.dragover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }

        .drop-zone.has-file {
            border-color: #22c55e;
            border-style: solid;
            background: rgba(34, 197, 94, 0.05);
        }

        .drop-icon {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        .drop-title {
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 500;
        }

        .drop-hint {
            color: #64748b;
            font-size: 13px;
            margin-top: 6px;
        }

        #fileInput {
            display: none;
        }

        /* File Item */
        .file-item {
            display: none;
            background: #0f172a;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            align-items: center;
            gap: 12px;
            border: 1px solid #334155;
        }

        .file-item.show {
            display: flex;
        }

        .file-thumb {
            width: 40px;
            height: 40px;
            background: #334155;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .file-meta {
            flex: 1;
            min-width: 0;
        }

        .file-meta-name {
            color: #f1f5f9;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta-size {
            color: #64748b;
            font-size: 12px;
            margin-top: 2px;
        }

        .file-delete {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .file-delete:hover {
            opacity: 1;
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: #94a3b8;
            font-size: 15px;
            font-weight: 600;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .action-btn.ready {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
        }

        .action-btn.ready:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }

        .action-btn.done {
            background: #22c55e;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            display: none;
            text-align: center;
            color: #22c55e;
            font-size: 13px;
            margin-top: 14px;
        }

        .status.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #475569;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo">📦</div>
            <h1>File Hub</h1>
            <p>Upload and download in seconds</p>
        </div>

        <div class="panel">
            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <span class="drop-icon" id="dropIcon">☁️</span>
                <span class="drop-title" id="dropTitle">Drop file here</span>
                <span class="drop-hint">or click to browse</span>
            </div>

            <input type="file" id="fileInput" onchange="handleFile(event)">

            <!-- File Info -->
            <div class="file-item" id="fileItem">
                <div class="file-thumb">📎</div>
                <div class="file-meta">
                    <div class="file-meta-name" id="metaName">-</div>
                    <div class="file-meta-size" id="metaSize">-</div>
                </div>
                <button class="file-delete" onclick="clearFile()" title="Remove">×</button>
            </div>

            <!-- Download Button -->
            <button class="action-btn" id="actionBtn" onclick="downloadFile()" disabled>
                <span class="spinner" id="spinner"></span>
                <span id="btnLabel">Select a file</span>
            </button>

            <div class="status" id="status">✅ File downloaded</div>
        </div>

        <div class="footer">Secure local transfer</div>
    </div>

    <script>
        let currentFile = null;
        let fileData = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileItem = document.getElementById('fileItem');
        const actionBtn = document.getElementById('actionBtn');
        const btnLabel = document.getElementById('btnLabel');
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('status');
        const dropIcon = document.getElementById('dropIcon');
        const dropTitle = document.getElementById('dropTitle');

        function handleFile(event) {
            const file = event.target.files?.[0] || event.dataTransfer?.files[0];
            if (!file) return;

            currentFile = file;

            const reader = new FileReader();
            reader.onload = (e) => { fileData = e.target.result; };
            reader.readAsDataURL(file);

            document.getElementById('metaName').textContent = file.name;
            document.getElementById('metaSize').textContent = formatSize(file.size);
            fileItem.classList.add('show');

            dropZone.classList.add('has-file');
            dropIcon.textContent = '✅';
            dropTitle.textContent = 'File loaded';

            actionBtn.classList.add('ready');
            actionBtn.disabled = false;
            btnLabel.textContent = 'Download File';
            status.classList.remove('show');
        }

        function downloadFile() {
            if (!currentFile || !fileData) return;

            btnLabel.textContent = '';
            spinner.style.display = 'inline-block';

            const link = document.createElement('a');
            link.href = fileData;
            link.download = currentFile.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            setTimeout(() => {
                spinner.style.display = 'none';
                actionBtn.classList.add('done');
                btnLabel.textContent = 'Done!';
                status.classList.add('show');

                setTimeout(() => {
                    actionBtn.classList.remove('done');
                    btnLabel.textContent = 'Download File';
                    status.classList.remove('show');
                }, 2000);
            }, 600);
        }

        function clearFile() {
            currentFile = null;
            fileData = null;

            fileInput.value = '';
            fileItem.classList.remove('show');

            dropZone.classList.remove('has-file');
            dropIcon.textContent = '☁️';
            dropTitle.textContent = 'Drop file here';

            actionBtn.classList.remove('ready');
            actionBtn.disabled = true;
            btnLabel.textContent = 'Select a file';
            status.classList.remove('show');
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // Drag events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile({ dataTransfer: e.dataTransfer });
            }
        });
    </script>
</body>
</html>
